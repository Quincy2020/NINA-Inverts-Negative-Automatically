<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <rect width="512" height="512" rx="120" fill="#141414"/>

  <defs>
    <path id="n-core" d="M 116 116 H 186 L 326 318 V 116 H 396 V 396 H 326 L 186 194 V 396 H 116 Z"/>

    <clipPath id="left-half">
      <rect x="0" y="0" width="256" height="512"/>
    </clipPath>
    
    <clipPath id="right-half">
      <rect x="256" y="0" width="256" height="512"/>
    </clipPath>

    <pattern id="digitalGrid" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="rgba(0,0,0,0.4)"/>
    </pattern>

    <filter id="digitalGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur" />
      <feFlood flood-color="#FF5500" flood-opacity="0.8" result="glowColor" />
      <feComposite in="glowColor" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(256, 256) scale(1.35) translate(-256, -256)">
    
    <g clip-path="url(#left-half)">
      <use href="#n-core" fill="#25282E" stroke="#3A3E47" stroke-width="2"/>
      
      <rect x="139" y="160" width="24" height="16" rx="4" fill="#141414" stroke="#000000" stroke-width="2"/>
      <rect x="139" y="201" width="24" height="16" rx="4" fill="#141414" stroke="#000000" stroke-width="2"/>
      <rect x="139" y="242" width="24" height="16" rx="4" fill="#141414" stroke="#000000" stroke-width="2"/>
      <rect x="139" y="283" width="24" height="16" rx="4" fill="#141414" stroke="#000000" stroke-width="2"/>
      <rect x="139" y="324" width="24" height="16" rx="4" fill="#141414" stroke="#000000" stroke-width="2"/>
      <rect x="139" y="365" width="24" height="16" rx="4" fill="#141414" stroke="#000000" stroke-width="2"/>
      
      <text x="126" y="340" font-family="monospace" font-size="10" font-weight="bold" fill="#444" transform="rotate(-90 126 340)">NINA 135 NEG</text>
    </g>

    <g clip-path="url(#right-half)" filter="url(#digitalGlow)">
      <use href="#n-core" fill="#FFB000"/>
      <use href="#n-core" fill="url(#digitalGrid)"/>
    </g>

    <g filter="url(#digitalGlow)">
      <rect x="248" y="170" width="8" height="8" fill="#FFB000"/>
      <rect x="240" y="238" width="8" height="8" fill="#FFB000"/>
      <rect x="250" y="246" width="6" height="6" fill="#FFB000"/>
      <rect x="244" y="324" width="12" height="12" fill="#FFB000"/>
    </g>

    <g fill="#25282E">
      <rect x="256" y="156" width="12" height="12" />
      <rect x="264" y="230" width="8" height="8" />
      <rect x="258" y="338" width="8" height="8" />
      <rect x="266" y="346" width="6" height="6" />
    </g>

  </g>
</svg>
